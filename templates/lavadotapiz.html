<!DOCTYPE html>
<html>
<head>
    <title>AGENDAR LAVADO TAPIZ - LAVA TU MAQUINA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        img {
            width: 200px;
            border-radius: 15px;
            border: 2px solid #333;
        }
        h1 {
            color: #00ff40;
            text-transform: uppercase;
            font-size: 26px;
        }
        .logo-container {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-logo {
            width: 200px;
            height: auto;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #060506;
            color: white;
            text-transform: uppercase;
        }
        .formulario {
            background: #c0ffb9;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
            color: #2c3e50;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        .boton {
            display: inline-block;
            padding: 15px 30px;
            margin-top: 30px;
            background-color: #008d00;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .boton:hover {
            background-color: #009929;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="/static/lt1.jpg" alt="Logo F1" class="header-logo">
    </div>
    <h1>AGENDAR LAVADO TAPIZ</h1>
    <div class="formulario">
        <form method="POST">
            <input type="text" id="rut" name="rut" 
                placeholder="RUT (ej: 17754077-2)" maxlength="11" 
                pattern="\d{7,8}-[\dkK]" title="Formato: 12345678-9 (sin puntos, con guión)"
                oninput="this.value = this.value.replace(/[^\d-kK]/g, '').toUpperCase().slice(0, 11)"
                required>
            <input type="text" id="nombre" name="nombre" 
                placeholder="NOMBRE" maxlength="20" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" 
                title="Solo letras y espacios (máximo 20 caracteres)"
                oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñ\s]/g, '').slice(0, 20)"
                required>
            <input type="email" name="email" id="email" placeholder="EMAIL" required>
            <div style="display: flex; align-items: center;">
                <span style="padding: 8px; background-color: #e9ecef; border: 1px solid #ced4da; border-radius: 4px 0 0 4px;">+569</span>
                <input 
                    type="text" id="telefono_usuario" name="telefono_usuario" 
                    placeholder="66822259" maxlength="8" pattern="\d{8}" 
                    title="Ingrese 8 dígitos (sin espacios ni guiones)"
                    oninput="this.value = this.value.replace(/\D/g, '')"
                    style="border-radius: 0 4px 4px 0; flex: 1;"
                    required>
                <input type="hidden" id="telefono_completo" name="telefono">
            </div>
            <input type="text" name="patente" 
                    id="patente"
                    placeholder="PATENTE (EJ: ABCD12)"
                    maxlength="8"
                    pattern="[A-Z0-9]{4,8}"
                    title="Solo letras y números (mínimo 4, máximo 8)"
                    oninput="this.value = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 8)"
                    required>

            <select name="id_servicio" required>
                <option value="">SELECCIONE SERVICIO</option>
                {% for servicio in servicios %}
                <option value="{{ servicio.id_servicio }}">{{ servicio.nombre }} - ${{ servicio.precio }}</option>
                {% endfor %}
            </select>
            {% if not servicios %}
                <p class="error">NO HAY SERVICIOS DISPONIBLES. CONTACTE CON VICENTE.</p>
            {% endif %}

            <label for="fecha">SELECCIONE FECHA:</label>
            <input type="date" name="fecha" id="fecha" required>

            <select name="hora" id="horas_lavadotapiz" required>
                <option value="">SELECCIONE HORA</option>
            </select>

            <button type="submit">AGENDAR</button>
        </form>
    </div>
    <p><a href="/" class="boton">⟲ VOLVER AL INICIO 🫧</a></p>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const rutInput = document.getElementById('rut');
            const nombreInput = document.getElementById('nombre');
            const emailInput = document.getElementById('email');
            const telefonoInput = document.getElementById('telefono_usuario');
            const patenteInput = document.getElementById('patente');

            if (rut) {
                 rutInput.addEventListener('blur', function() {
                    const rut = this.value;
                    if (rut) {
                        fetch(`/buscar_cliente?rut=${rut}`)
                            .then(response => response.json())
                            .then(data => {
                                if (data.existe) {
                                    if (nombreInput) nombreInput.value = data.nombre || '';
                                    if (emailInput) emailInput.value = data.email || '';
                                    if (telefonoInput) telefonoInput.value = data.telefono || '';
                                    if (patenteInput) patenteInput.value = ''; // No autocompletar patente
                                } else {
                                    if (nombreInput) nombreInput.value = '';
                                    if (emailInput) emailInput.value = '';
                                    if (telefonoInput) telefonoInput.value = '';
                                }
                            })
                            .catch(error => {
                                console.error('Error al buscar cliente:', error);
                                if (nombreInput) nombreInput.value = '';
                                if (emailInput) emailInput.value = '';
                                if (telefonoInput) telefonoInput.value = '';
                            });
                    }
                });
            } else {
                console.error('Error: No se encontraron los elementos rut o nombre');
            }

            // Lógica para cargar las horas disponibles según la fecha
            const fechaInput = document.getElementById('fecha');
            const horasSelect = document.getElementById('horas_lavadotapiz');

            if (fechaInput && horasSelect) {
                fechaInput.addEventListener('change', function() {
                    const fecha = this.value;
                    if (fecha) {
                        fetch(`/horas_disponibles?fecha=${fecha}`)
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error('Error de red o del servidor');
                                }
                                return response.json();
                            })
                            .then(data => {
                                horasSelect.innerHTML = '<option value="">SELECCIONE HORA</option>';
                                if (data.error) {
                                    const option = document.createElement('option');
                                    option.value = '';
                                    option.disabled = true;
                                    option.text = 'Error al cargar horas';
                                    horasSelect.appendChild(option);
                                } else {
                                    if (data.disponibles_lavadotapiz.length > 0) {
                                        data.disponibles_lavadotapiz.forEach(banda => {
                                            const option = document.createElement('option');
                                            option.value = banda.split('-')[0];
                                            option.text = banda;
                                            horasSelect.appendChild(option);
                                        });
                                    } else {
                                        const option = document.createElement('option');
                                        option.value = '';
                                        option.disabled = true;
                                        option.text = 'No hay horas disponibles para lavado tapiz';
                                        horasSelect.appendChild(option);
                                    }
                                }
                            })
                            .catch(error => {
                                console.error('Error en la petición de horas:', error);
                                horasSelect.innerHTML = '<option value="">Error de conexión</option>';
                            });
                    } else {
                        horasSelect.innerHTML = '<option value="">SELECCIONE HORA</option>';
                    }
                });
            } else {
                console.error('Error: No se encontraron los elementos fecha o horas');
            }
            
            // Combinar código +569 con teléfono
            document.querySelector('form').addEventListener('submit', function(e) {
                const telefonoUsuario = document.getElementById('telefono_usuario').value;
                const telefonoCompleto = '+569' + telefonoUsuario;
                document.getElementById('telefono_completo').value = telefonoCompleto;
            });
        });
    </script>
</body>
</html>
