<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #01172c; color: #fff; }
        .navbar { background-color: #02771c; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .card { background-color: #022b3a; padding: 20px; color: #e6e6e6; }
        .form-label { color: #ffffff; font-weight: bold; }
        .btn-success { background-color: #04fa04; border: none; }
        .btn-secondary { background-color: #02771c; border: none; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Nuevo Cliente</a>
            <div class="d-flex">
                <a href="{{ url_for('admin.agenda_manual') }}" class="btn btn-secondary">Volver a Agenda Manual</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" id="auto-dismiss-alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
                
                <script>
                    setTimeout(function() {
                        var alertElement = document.getElementById('auto-dismiss-alert');
                        if (alertElement) {
                            var bsAlert = new bootstrap.Alert(alertElement);
                            bsAlert.close();
                        }
                    }, 5000); 
                </script>
            {% endif %}
        {% endwith %}
        <!-- FIN BLOQUE -->
        <div class="card">
            <h3 class="mb-3">Agregar Cliente</h3>
            <!-- FORMULARIO -->
            <form method="POST" action="{{ url_for('admin.nuevo_cliente') }}">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="apellido" class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="rut" class="form-label">RUT</label>
                    <input type="text" name="rut" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" required>
                </div>
            <button type="submit" class="btn btn-success w-100">Guardar Cliente</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
