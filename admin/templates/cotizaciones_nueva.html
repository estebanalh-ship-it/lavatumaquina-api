<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Cotización</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .input-monto { text-align: right; }
        .total-display { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-4 mb-5">
        <h2 class="mb-4">📝 Crear Nueva Cotización</h2>

        <form method="POST" action="{{ url_for('admin.nueva_cotizacion') }}">
            <div class="card shadow mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Datos del Cliente</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">RUT</label>
                            <input type="text" name="rut" id="campo-rut" 
                                class="form-control" required placeholder="12.345.678-9"
                                oinput="buscarCliente(this.value)">
                            <small id="mensaje-cliente" class="form-text"></small>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Nombre / Razón Social</label>
                            <input type="text" name="nombre" id="campo-nombre" 
                                class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Teléfono</label>
                            <input type="text" name="telefono" id="campo-telefono"
                                class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" id="campo-email"
                                class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: ÍTEMS / PRODUCTOS -->
            <div class="card shadow mb-4">
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Detalle de Servicios</h5>
                    <button type="button" class="btn btn-sm btn-light text-dark" onclick="agregarFila()">
                        <i class="fas fa-plus"></i> Agregar Fila
                    </button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-bordered mb-0" id="tablaItems">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 40%">Descripción</th>
                                <th style="width: 15%">Cantidad</th>
                                <th style="width: 20%">Precio Neto</th>
                                <th style="width: 20%">Total Fila</th>
                                <th style="width: 5%"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            <!-- Fila Inicial -->
                            <tr class="fila-item">
                                <td><input type="text" name="items_producto[]" class="form-control" required placeholder="Ej: Lavado Full"></td>
                                <td><input type="number" name="items_cantidad[]" class="form-control input-monto" value="1" min="1" oninput="calcularTotales()" required></td>
                                <td><input type="number" name="items_precio[]" class="form-control input-monto" placeholder="0" min="0" oninput="calcularTotales()" required></td>
                                <td class="text-end align-middle fw-bold span-subtotal">$0</td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-danger btn-sm" disabled>
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Resumen de Totales -->
                <div class="card-footer bg-white">
                    <div class="row justify-content-end text-end">
                        <div class="col-md-4">
                            <p class="mb-1">Neto: <span id="displayNeto">$0</span></p>
                            <p class="mb-1">IVA (19%): <span id="displayIVA">$0</span></p>
                            <h4 class="text-success fw-bold">Total: <span id="displayTotal">$0</span></h4>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin.lista_cotizaciones') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="fas fa-save"></i> Guardar Cotización
                </button>
            </div>
        </form>
    </div>

    <!-- JAVASCRIPT: Lógica de cálculo en vivo -->
    <script>
        function formatearMoneda(valor) {
            return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(valor);
        }

        function calcularTotales() {
            let totalNeto = 0;
            const filas = document.querySelectorAll('.fila-item');

            filas.forEach(fila => {
                const cantInput = fila.querySelector('input[name="items_cantidad[]"]');
                const precioInput = fila.querySelector('input[name="items_precio[]"]');
                const spanSubtotal = fila.querySelector('.span-subtotal');

                const cantidad = parseFloat(cantInput.value) || 0;
                const precio = parseFloat(precioInput.value) || 0;
                
                const subtotal = cantidad * precio;
                spanSubtotal.textContent = formatearMoneda(subtotal);
                
                totalNeto += subtotal;
            });

            const iva = totalNeto * 0.19;
            const totalFinal = totalNeto + iva;

            document.getElementById('displayNeto').textContent = formatearMoneda(totalNeto);
            document.getElementById('displayIVA').textContent = formatearMoneda(iva);
            document.getElementById('displayTotal').textContent = formatearMoneda(totalFinal);
        }

        function agregarFila() {
            const tbody = document.getElementById('cuerpoTabla');
            const fila = document.createElement('tr');
            fila.className = 'fila-item';
            
            fila.innerHTML = `
                <td><input type="text" name="items_producto[]" class="form-control" required></td>
                <td><input type="number" name="items_cantidad[]" class="form-control input-monto" value="1" min="1" oninput="calcularTotales()" required></td>
                <td><input type="number" name="items_precio[]" class="form-control input-monto" placeholder="0" min="0" oninput="calcularTotales()" required></td>
                <td class="text-end align-middle fw-bold span-subtotal">$0</td>
                <td class="text-center">
                    <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(fila);
        }

        function eliminarFila(btn) {
            const fila = btn.closest('tr');
            fila.remove();
            calcularTotales(); 
        }
    </script>
    <script>
        let timerBusqueda;
        function buscarCliente(rut) {
            if (rut.length < 8) {
                limpiarCampos();
                return;
            }
            clearTimeout(timerBusqueda);
            timerBusqueda = setTimeout(function() {
                fetch('/admin/buscar_cliente_admin?rut=' + encodeURIComponent(rut))
                    .then(response => response.json())
                    .then(data => {
                        const mensaje = document.getElementById('mensaje-cliente');
                        if (data.existe) {
                            document.getElementById('campo-nombre').value   = data.nombre || '';
                            document.getElementById('campo-telefono').value = data.telefono || '';
                            document.getElementById('campo-email').value    = data.email || '';
                            mensaje.textContent = '✅ Cliente encontrado y datos cargados.';
                            mensaje.className = 'form-text text-success fw-bold';
                            bloquearCampos(true);
    
                        } else {
                            limpiarCampos();
                            mensaje.textContent = '✍️ Cliente nuevo, completa los datos.';
                            mensaje.className = 'form-text text-warning fw-bold';
                        }
                    })
                    .catch(error => {
                        console.error('Error buscando cliente:', error);
                    });
    
            }, 600); 
        }
    
        function limpiarCampos() {
            document.getElementById('campo-nombre').value   = '';
            document.getElementById('campo-telefono').value = '';
            document.getElementById('campo-email').value    = '';
            document.getElementById('mensaje-cliente').textContent = '';
            bloquearCampos(false);
        }
        function bloquearCampos(bloquear) {
            document.getElementById('campo-nombre').readOnly   = bloquear;
            document.getElementById('campo-telefono').readOnly = bloquear;
            document.getElementById('campo-email').readOnly    = bloquear;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
