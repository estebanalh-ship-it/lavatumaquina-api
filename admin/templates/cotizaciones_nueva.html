<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Cotización</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <div class="container mt-4 mb-5">
        <h2 class="mb-4">📝 Crear Nueva Cotización</h2>

        <form method="POST" action="{{ url_for('admin.nueva_cotizacion') }}">
            
            <!-- SECCIÓN 1: DATOS CLIENTE -->
            <div class="card shadow mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Datos del Cliente</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">RUT</label>
                            <input type="text" name="rut" class="form-control" required placeholder="12.345.678-9">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Nombre / Razón Social</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Teléfono</label>
                            <input type="text" name="telefono" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: ÍTEMS / PRODUCTOS -->
            <div class="card shadow mb-4">
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Detalle de Servicios / Productos</h5>
                    <button type="button" class="btn btn-sm btn-light text-dark" onclick="agregarFila()">
                        <i class="fas fa-plus"></i> Agregar Fila
                    </button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-bordered mb-0" id="tablaItems">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 50%">Descripción</th>
                                <th style="width: 15%">Cantidad</th>
                                <th style="width: 25%">Precio Unit.</th>
                                <th style="width: 10%">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            <!-- Fila Inicial -->
                            <tr>
                                <td><input type="text" name="items_producto[]" class="form-control" required placeholder="Ej: Lavado Full"></td>
                                <td><input type="number" name="items_cantidad[]" class="form-control" value="1" required></td>
                                <td><input type="number" name="items_precio[]" class="form-control" placeholder="0" required></td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-danger btn-sm" disabled>
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin.lista_cotizaciones') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="fas fa-save"></i> Guardar Cotización
                </button>
            </div>
        </form>
    </div>

    <!-- JAVASCRIPT PARA AGREGAR FILAS -->
    <script>
        function agregarFila() {
            const tbody = document.getElementById('cuerpoTabla');
            const fila = document.createElement('tr');
            
            fila.innerHTML = `
                <td><input type="text" name="items_producto[]" class="form-control" required></td>
                <td><input type="number" name="items_cantidad[]" class="form-control" value="1" required></td>
                <td><input type="number" name="items_precio[]" class="form-control" placeholder="0" required></td>
                <td class="text-center">
                    <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(fila);
        }

        function eliminarFila(btn) {
            const fila = btn.closest('tr');
            fila.remove();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
