<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Administración Lava tu Máquina</title>
    <style>
      img {
                width: 300px;
                border-radius: 15px;
                border: 2px solid #333;
      }
      :root{
        --bg-color:#1a2029;
        --panel-color:#164e4b;
        --field-color:#FFEBCD;
        --text-on-dark:#F3F4F6;
        --accent:#F59E0B;
      }

      *{ box-sizing:border-box; }
      html,body{ height:100%; }


      body{
        margin:0;
        display:flex;
        align-items:center;
        justify-content:center;
        background:var(--bg-color);
        color:var(--text-on-dark);
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Noto Sans","Helvetica Neue",Arial,sans-serif;
      }

      .login-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }


      .logo-container {
                width: min(720px, 92vw);
                text-align: center;
      }
      .logo {
                width: 100%;
                height: auto;
                display: inline-block;
      }
      .card{
        width:min(720px,92vw);
        background:var(--panel-color);
        padding:32px;
        border-radius:16px;
        box-shadow:0 10px 30px rgba(0,0,0,.35);
      }

      .title{
        text-align:center;
        font-size:1.5rem;
        margin:0 0 20px 0;
      }

      form{ display:grid; gap:16px; }

      .grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:16px;
      }
      @media (max-width:640px){
        .grid{ grid-template-columns:1fr; }
      }

      .box{
        background:rgba(255,255,255,0.06);
        padding:16px;
        border-radius:12px;
      }

      label{
        display:block;
        font-size:.9rem;
        margin-bottom:8px;
      }

      input[type="email"],
      input[type="password"]{
        width:100%;
        padding:12px 14px;
        border-radius:10px;
        border:1px solid rgba(0,0,0,.2);
        background:var(--field-color);
        color:#222;
        outline:none;
      }
      input::placeholder{ color:#6b7280; }

      .actions{
        display:flex;
        justify-content:center;
      }
      button[type="submit"]{
        padding:12px 20px;
        border:none;
        border-radius:10px;
        background:var(--accent);
        color:#1f2937;
        font-weight:600;
        cursor:pointer;
      }
      button[type="submit"]:hover{ filter:brightness(.95); }

      .note{
        text-align:center;
        font-size:.85rem;
        opacity:.9;
        margin-top:6px;
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="logo-container">
        <img src="/static/admin.jpg" alt="Lava tu maquina Rengo" class="logo">
      </div>
      <main class="card">
        <h1 class="title">Administración Lava tu Máquina</h1>

        <form action="{{ url_for('admin.login') }}" method="post">
          <section class="grid">
            <div class="box">
              <label for="email">Correo</label>
              <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" autocomplete="username" required>
            </div>

            <div class="box">
              <label for="password">Contraseña</label>
              <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
          </section>

          <div class="actions">
            <button type="submit">Entrar</button>
          </div>

          <p class="note">¡SOMOS EL MEJOR CARWASH DE LA REGION!</p>
        </form>
      </main>

    </div>
  </body>
</html>
